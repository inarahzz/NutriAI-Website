<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI – Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <style>
        /* Override: make the main chat area hold the iframe */
        .chat-messages {
            padding: 0 !important;
            gap: 0 !important;
        }

        .botpress-iframe-container {
            width: 100%;
            height: 100%;
            flex: 1;
            display: flex;
        }

        .botpress-iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Hide the old suggested prompts and input since Botpress handles that */
        .suggested-prompts,
        .chat-input-area {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar chat-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.svg" alt="NutriAI Logo" class="logo-img">
            </a>
            <a href="index.html" class="nav-cta">← Back to Home</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Chat Layout -->
    <div class="chat-layout">
        <!-- Sidebar -->
        <aside class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <h3>NutriAI</h3>
                <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="sidebar-nav-item active">
                    <span class="nav-icon">💬</span>
                    <span>Chat</span>
                </a>
                <a href="profile.html" class="sidebar-nav-item">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="chat-history" id="chat-history">
                <div class="history-header">
                    <h4>Recent Chats</h4>
                </div>
                <div class="history-list" id="history-list">
                    <p class="no-chats">No conversations yet</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="delete-all-btn" id="delete-all-btn">🗑️ Delete All Chats</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
                <h2 id="chat-title">NutriAI Chat</h2>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="botpress-iframe-container">
                    <iframe 
                        src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/07/08/13/20260708135933-7O32B0QO.json"
                        title="NutriAI Chatbot"
                        allow="microphone"
                    ></iframe>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Sidebar toggle for mobile
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const chatSidebar = document.getElementById('chat-sidebar');
        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', () => {
                chatSidebar.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
