<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI – Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <style>
        /* Make the main chat area a positioning context */
        .chat-main {
            position: relative;
        }

        .botpress-embed {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* Force the Botpress webchat widget into the main chat area */
        /* Hide the floating button */
        .bpFab,
        [class*="FabContainer"],
        [class*="fab-container"],
        button[aria-label="Open chat"],
        button[aria-label="Close chat"] {
            display: none !important;
        }

        /* Force the chat window to fill the botpress-embed container */
        .bpChat,
        [class*="ChatContainer"],
        [class*="chat-container"],
        [class*="WebchatContainer"],
        [class*="webchat-container"] {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            transform: none !important;
            transition: none !important;
        }

        /* Target the Botpress shadow host element */
        #bp-web-widget {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Move the Botpress widget into the embed container via JS below */
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar chat-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.svg" alt="NutriAI Logo" class="logo-img">
            </a>
            <a href="index.html" class="nav-cta">← Back to Home</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Chat Layout -->
    <div class="chat-layout">
        <!-- Sidebar -->
        <aside class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <h3>NutriAI</h3>
                <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="sidebar-nav-item active">
                    <span class="nav-icon">💬</span>
                    <span>Chat</span>
                </a>
                <a href="profile.html" class="sidebar-nav-item">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="chat-history" id="chat-history">
                <div class="history-header">
                    <h4>Recent Chats</h4>
                </div>
                <div class="history-list" id="history-list">
                    <p class="no-chats">No conversations yet</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="delete-all-btn" id="delete-all-btn">🗑️ Delete All Chats</button>
            </div>
        </aside>

        <!-- Main Chat Area with Botpress -->
        <main class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
                <h2 id="chat-title">NutriAI Chat</h2>
            </div>

            <!-- Botpress embedded here -->
            <div class="botpress-embed" id="botpress-embed"></div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/07/08/13/20260708135932-6JVHL9Y3.js" defer></script>
    <script>
        // Sidebar toggle for mobile
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const chatSidebar = document.getElementById('chat-sidebar');
        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', () => {
                chatSidebar.classList.toggle('open');
            });
        }

        // Wait for Botpress to inject, then move it into our container and auto-open
        window.addEventListener('load', function() {
            const tryEmbed = setInterval(function() {
                const bpWidget = document.getElementById('bp-web-widget');
                const container = document.getElementById('botpress-embed');
                
                if (bpWidget && container) {
                    // Move the widget inside our container
                    container.appendChild(bpWidget);
                    
                    // Auto-open the chat
                    if (window.botpress) {
                        window.botpress.open();
                    }
                    clearInterval(tryEmbed);
                }
            }, 300);
            
            // Also keep trying to open it
            const tryOpen = setInterval(function() {
                if (window.botpress) {
                    window.botpress.open();
                    clearInterval(tryOpen);
                }
            }, 500);

            setTimeout(() => { clearInterval(tryEmbed); clearInterval(tryOpen); }, 15000);
        });
    </script>
</body>
</html>
