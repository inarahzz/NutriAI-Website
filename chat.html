<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI – Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar chat-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.svg" alt="NutriAI Logo" class="logo-img">
            </a>
            <a href="index.html" class="nav-cta">← Back to Home</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Chat Layout -->
    <div class="chat-layout">
        <!-- Sidebar -->
        <aside class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <h3>NutriAI</h3>
                <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="sidebar-nav-item active">
                    <span class="nav-icon">💬</span>
                    <span>Chat</span>
                </a>
                <a href="profile.html" class="sidebar-nav-item">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="chat-history" id="chat-history">
                <div class="history-header">
                    <h4>Recent Chats</h4>
                    <button class="export-all-btn" id="export-all-btn" title="Export all chats">📥</button>
                </div>
                <div class="history-list" id="history-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="delete-all-btn" id="delete-all-btn">🗑️ Delete All Chats</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
                <h2 id="chat-title">New Chat</h2>
                <div class="chat-actions">
                    <button class="chat-action-btn" id="export-chat-btn" title="Export this chat as PDF">📄 Export PDF</button>
                    <button class="chat-action-btn danger" id="delete-chat-btn" title="Delete this chat">🗑️ Delete</button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Welcome state -->
                <div class="welcome-state" id="welcome-state">
                    <div class="welcome-icon">🥗</div>
                    <h2>How can I help you eat better today?</h2>
                    <p>Ask me about any meal, get nutrition analysis, or find healthier alternatives.</p>
                </div>
            </div>

            <div class="suggested-prompts" id="suggested-prompts">
                <button class="prompt-chip">What did I eat today — nasi lemak</button>
                <button class="prompt-chip">Suggest a healthy lunch</button>
                <button class="prompt-chip">What's a good breakfast?</button>
                <button class="prompt-chip">High protein meals under $5</button>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Ask about any meal or nutrition topic...">
                    <button class="send-btn" id="send-btn" aria-label="Send message">➤</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
