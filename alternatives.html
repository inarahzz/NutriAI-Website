        // DOM elements
        const searchForm = document.getElementById('search-form');
        const foodInput = document.getElementById('food-input');
        const searchResult = document.getElementById('search-result');
        const categoryTabs = document.querySelectorAll('.category-tab');
        const alternativesList = document.getElementById('alternatives-list');

        // Search functionality
        function findAlternative(query) {
            query = query.toLowerCase().trim();
            if (!query) return null;
            
            let bestMatch = null;
            let bestScore = 0;
            
            for (const item of alternatives) {
                for (const keyword of item.keywords) {
                    if (query.includes(keyword) || keyword.includes(query)) {
                        const score = keyword === query ? 10 : keyword.includes(query) ? 5 : 3;
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = item;
                        }
                    }
                }
            }
            return bestMatch;
        }

        function renderSearchResult(match) {
            if (!match) {
                searchResult.style.display = 'block';
                searchResult.innerHTML = `
                    <div class="no-result">
                        <span class="no-result-emoji">🤔</span>
                        <h3>No match found</h3>
                        <p>Try a different food, or browse the categories below!</p>
                    </div>
                `;
                return;
            }

            const calDiff = match.original.calories - match.alternative.calories;
            const proteinDiff = match.alternative.protein - match.original.protein;
            const fatDiff = match.original.fat - match.alternative.fat;

            searchResult.style.display = 'block';
            searchResult.innerHTML = `
                <div class="swap-card result-card">
                    <div class="swap-top">
                        <div class="swap-meal original-meal">
                            <span class="meal-emoji">${match.original.emoji}</span>
                            <div class="meal-info">
                                <span class="swap-label">Instead of</span>
                                <h3>${match.original.name}</h3>
                                <span class="calorie-tag">${match.original.calories} kcal</span>
                            </div>
                        </div>
                        <div class="swap-arrow">→</div>
                        <div class="swap-meal recommended-meal">
                            <span class="meal-emoji">${match.alternative.emoji}</span>
                            <div class="meal-info">
                                <span class="swap-label">Try this</span>
                                <h3>${match.alternative.name}</h3>
                                <span class="calorie-tag green">${match.alternative.calories} kcal</span>
                            </div>
                        </div>
                    </div>
                    <div class="swap-highlights">
                        <span class="highlight-pill good">↓ ${calDiff} kcal</span>
                        ${proteinDiff > 0 ? `<span class="highlight-pill good">↑ +${proteinDiff}g protein</span>` : ''}
                        ${fatDiff > 0 ? `<span class="highlight-pill good">↓ ${fatDiff}g fat</span>` : ''}
                    </div>
                    <div class="result-benefits">
                        <h4>Why this is better:</h4>
                        <ul class="benefits-list">
                            ${match.benefits.map(b => `<li>${b}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;

            searchResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Render category cards
        function renderCards(category) {
            const filtered = category === 'all' 
                ? alternatives 
                : alternatives.filter(item => item.category === category);

            alternativesList.innerHTML = filtered.map(item => {
                const calDiff = item.original.calories - item.alternative.calories;
                const proteinDiff = item.alternative.protein - item.original.protein;
                const fatDiff = item.original.fat - item.alternative.fat;

                return `
                    <div class="swap-card">
                        <div class="swap-top">
                            <div class="swap-meal original-meal">
                                <span class="meal-emoji">${item.original.emoji}</span>
                                <div class="meal-info">
                                    <span class="swap-label">Instead of</span>
                                    <h3>${item.original.name}</h3>
                                    <span class="calorie-tag">${item.original.calories} kcal</span>
                                </div>
                            </div>
                            <div class="swap-arrow">→</div>
                            <div class="swap-meal recommended-meal">
                                <span class="meal-emoji">${item.alternative.emoji}</span>
                                <div class="meal-info">
                                    <span class="swap-label">Try this</span>
                                    <h3>${item.alternative.name}</h3>
                                    <span class="calorie-tag green">${item.alternative.calories} kcal</span>
                                </div>
                            </div>
                        </div>
                        <div class="swap-highlights">
                            <span class="highlight-pill good">↓ ${calDiff} kcal</span>
                            ${proteinDiff > 0 ? `<span class="highlight-pill good">↑ +${proteinDiff}g protein</span>` : ''}
                            ${fatDiff > 0 ? `<span class="highlight-pill good">↓ ${fatDiff}g fat</span>` : ''}
                        </div>
                        <details class="swap-details">
                            <summary>Why this is better</summary>
                            <ul class="benefits-list">
                                ${item.benefits.map(b => `<li>${b}</li>`).join('')}
                            </ul>
                        </details>
                    </div>
                `;
            }).join('');
        }

        // Event listeners
        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const query = foodInput.value;
            const match = findAlternative(query);
            renderSearchResult(match);
        });

        categoryTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                categoryTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderCards(this.getAttribute('data-category'));
            });
        });

        // Initial render - show all
        renderCards('all');
    </script>
