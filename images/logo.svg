<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100">
  <!-- APPLE + SPEECH BUBBLE -->
  <g transform="translate(8, 5)">
    <!-- Leaf back (darker) -->
    <path d="M 38 15 C 34 8 37 2 42 0 C 44 0 43 7 40 13" fill="#1b8c26"/>
    <!-- Leaf front (brighter) -->
    <path d="M 40 13 C 43 6 49 4 53 5 C 53 5 50 12 43 14" fill="#2db83a"/>
    <!-- Stem -->
    <path d="M 40 14 L 39 22" stroke="#1b7522" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Apple body - large rounded with chat bubble tail bottom-left -->
    <path d="M 39 22 C 58 19 75 27 76 44 C 77 61 65 74 48 75 C 39 76 30 72 24 66 L 13 78 L 17 65 C 11 59 7 51 8 42 C 9 26 22 19 39 22 Z" fill="#2db83a"/>
    <!-- White bold N -->
    <text x="27" y="60" font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-size="38" font-weight="800" fill="white">N</text>
  </g>

  <!-- "utri" in green -->
  <text x="88" y="72" font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-size="48" font-weight="800" fill="#2db83a" letter-spacing="-2">utri</text>

  <!-- Orange heart (replaces dot on i in AI) -->
  <path d="M 221 30 C 219 26 221 22 224 22 C 226 22 228 24 228 24 C 228 24 230 22 232 22 C 235 22 237 26 235 30 C 233 34 228 38 228 38 C 228 38 223 34 221 30 Z" fill="#f47a1c"/>

  <!-- "AI" in cyan -->
  <text x="210" y="72" font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-size="48" font-weight="800" fill="#1cc8cc" letter-spacing="-2">AI</text>
</svg>